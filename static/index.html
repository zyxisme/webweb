<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebWeb Browser</title>
    <link id="favicon" rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌐</text></svg>">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div id="browser">
        <!-- Address Bar (always at top) -->
        <div id="address-bar">
            <button id="back-btn" title="后退">←</button>
            <button id="forward-btn" title="前进">→</button>
            <button id="refresh-btn" title="刷新">↻</button>
            <input type="text" id="url-input" placeholder="输入URL并按回车跳转..." autocomplete="off">
            <button id="go-btn" title="跳转">↩</button>
            <div id="zoom-controls">
                <button id="zoom-out-btn" title="缩小 (Ctrl+-)">−</button>
                <span id="zoom-level">100%</span>
                <button id="zoom-in-btn" title="放大 (Ctrl++)">+</button>
            </div>
            <button id="layout-toggle-btn" title="切换布局">⊞</button>
            <button id="settings-btn" title="设置">⚙</button>
        </div>

        <!-- Settings Modal -->
        <div id="settings-modal" class="modal hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>设置</h2>
                    <button id="close-settings-btn" class="modal-close">×</button>
                </div>
                <div class="modal-body">
                    <div class="settings-section">
                        <h3>调试日志</h3>
                        <div class="setting-item">
                            <pre id="log-output" class="log-output"></pre>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Main Content Area -->
        <div id="main-area">
            <!-- Tab Bar -->
            <div id="tab-bar">
                <div id="tabs-container"></div>
                <button id="new-tab-btn" title="新建标签页 (Ctrl+T)">+</button>
                <button id="collapse-btn" title="折叠/展开">«</button>
            </div>

            <!-- Content Area with Canvas -->
            <div id="content-area">
                <canvas id="browser-canvas"></canvas>
            </div>
        </div>
    </div>

    <script type="module" src="/js/app.js"></script>
</body>
</html>

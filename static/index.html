<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebWeb Browser</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div id="browser" class="layout-top">
        <!-- Address bar -->
        <div id="address-bar">
            <div class="nav-buttons">
                <button id="btn-back" class="nav-btn" title="后退">←</button>
                <button id="btn-forward" class="nav-btn" title="前进">→</button>
                <button id="btn-refresh" class="nav-btn" title="刷新">↻</button>
            </div>
            <input type="text" id="url-input" placeholder="输入URL或搜索" autocomplete="off">
            <button id="btn-go" class="go-btn">前往</button>
        </div>

        <!-- Tab bar -->
        <div id="tab-bar">
            <div id="tabs-container"></div>
            <button id="btn-new-tab" class="tab-btn" title="新建标签">+</button>
        </div>

        <!-- Main content area with Canvas -->
        <div id="main-area">
            <canvas id="browser-canvas"></canvas>
        </div>
    </div>

    <script type="module" src="/js/app.js"></script>
</body>
</html>

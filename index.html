<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebWeb Browser</title>
  <link id="favicon" rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌐</text></svg>">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="browser">
    <!-- Address Bar (always at top) -->
    <div id="address-bar">
      <button id="back-btn" title="后退">←</button>
      <button id="forward-btn" title="前进">→</button>
      <input type="text" id="url-input" placeholder="输入URL并按回车跳转...">
      <button id="go-btn" title="跳转">↩</button>
      <div id="zoom-controls">
        <button id="zoom-out-btn" title="缩小 (Ctrl+-)">−</button>
        <span id="zoom-level">100%</span>
        <button id="zoom-in-btn" title="放大 (Ctrl++)">+</button>
      </div>
      <button id="layout-toggle-btn" title="切换布局">⊞</button>
      <button id="settings-btn" title="设置">⚙</button>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal hidden">
      <div class="modal-content">
        <div class="modal-header">
          <h2>设置</h2>
          <button id="close-settings-btn" class="modal-close">×</button>
        </div>
        <div class="modal-body">
          <div class="settings-section">
            <h3>代理设置</h3>
            <div class="setting-item">
              <label class="setting-label">
                <input type="checkbox" id="proxy-enabled" checked>
                <span>启用代理</span>
              </label>
              <p class="setting-hint">通过代理服务器访问网页，绕过跨域限制</p>
            </div>
            <div class="setting-item">
              <label class="setting-label" for="proxy-url">代理地址</label>
              <input type="text" id="proxy-url" class="setting-input" placeholder="http://localhost:8088/?url=">
              <p class="setting-hint">本地代理: http://localhost:8088/?url=</p>
            </div>
            <div class="setting-item">
              <button id="test-proxy-btn" class="btn-secondary">测试代理</button>
              <span id="proxy-test-result" class="setting-hint"></span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Main Content Area -->
    <div id="main-area">
      <!-- Tab Bar -->
      <div id="tab-bar">
        <div id="tabs-container"></div>
        <button id="new-tab-btn" title="新建标签页 (Ctrl+T)">+</button>
        <button id="collapse-btn" title="折叠/展开">«</button>
      </div>

      <!-- Content Area -->
      <div id="content-area"></div>
    </div>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/proxy.js"></script>
  <script src="js/tab-manager.js"></script>
  <script src="js/zoom.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
